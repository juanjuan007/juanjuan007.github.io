<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        body { 
            font-family: -apple-system, "SF Pro TC", "Microsoft JhengHei", sans-serif; 
            line-height: 1.7; 
            max-width: 700px; 
            margin: 50px auto; 
            padding: 0 20px; 
            color: #333; 
        }

        .back { 
            display: inline-block;
            margin-bottom: 25px; 
            text-decoration: none; 
            color: #bbb; 
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        .back:hover { color: #000; }

        /* 標題：縮小尺寸，保持優雅 */
        h1 { 
            font-size: 1.8rem; /* 從 2.2 縮小到 1.8 */
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
            border: none;
            letter-spacing: -0.5px;
        }

        /* > 日期：纖細的線條與淡灰色 */
        .post-info {
            border-left: 2px solid #f0f0f0; 
            padding-left: 12px;
            margin-bottom: 45px;
            color: #aaa;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .post-content {
            font-size: 1.05rem;
            color: #333;
        }

        /* 內文標題也稍微連動縮小，保持層次感 */
        .post-content h2 { font-size: 1.4rem; margin-top: 30px; }
        .post-content h3 { font-size: 1.2rem; }
    </style>
</head>
<body>
    <a href="/archives/" class="back">← Back to Archives</a>

    <h1>{{ page.title }}</h1>
    
    <div class="post-info">
        {{ page.date | date: "%Y-%m-%d" }}
    </div>

    <div class="post-content">
        {{ content }}
    </div>
</body>
</html>
