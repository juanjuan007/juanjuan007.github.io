<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.8; 
            max-width: 700px; /* 稍微縮窄一點，閱讀更舒服 */
            margin: 60px auto; 
            padding: 20px; 
            color: #222; 
        }
        
        /* 標題：加大、加粗、去掉下劃線 */
        h1 { 
            font-size: 2.8rem; 
            font-weight: 800; 
            border-bottom: none; /* 去掉原本那條粗線 */
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        /* 日期：變小、變淡、放在標題下方 */
        .date { 
            color: #bbb; 
            font-style: normal; 
            font-family: monospace; /* 用等寬字體很有工程師感 */
            margin-bottom: 40px;
            display: block;
        }
        
        /* 返回連結：淡淡的，滑過去變黑 */
        .back { 
            font-size: 0.9rem;
            color: #999; 
            transition: 0.3s;
        }
        .back:hover { color: #000; }
    </style>
</head>
<body>
    <a href="/" class="back">← 返回首頁</a>
    <h1>{{ page.title }}</h1>
    <p class="date">{{ page.date | date: "%Y-%m-%d" }}</p>
    <hr>
    {{ content }}
</body>
</html>
