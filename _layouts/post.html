<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        body { 
            font-family: -apple-system, "SF Pro TC", "Microsoft JhengHei", sans-serif; 
            line-height: 1.7; 
            max-width: 700px; 
            margin: 50px auto; 
            padding: 0 20px; 
            color: #333; 
        }

        .back { 
            display: inline-block;
            margin-bottom: 25px; 
            text-decoration: none; 
            color: #bbb; 
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        .back:hover { color: #000; }

        /* 標題：對齊你的優雅風格 */
        h1 { 
            font-size: 1.8rem; 
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
            border: none;
            letter-spacing: -0.5px;
        }

        /* 日期區塊：帶有左側裝飾線 */
        .post-info {
            border-left: 2px solid #f0f0f0; 
            padding-left: 12px;
            margin-bottom: 45px;
            color: #aaa;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .post-content {
            font-size: 1.05rem;
            color: #333;
        }

        /* 內文標題樣式調整 */
        .post-content h2 { font-size: 1.4rem; margin-top: 30px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .post-content h3 { font-size: 1.2rem; margin-top: 25px; }
        
        /* 針對 INFO 或 無日期文章的間距補償 */
        .no-date-spacer {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    {% if page.path contains "_problems/" %}
        <a href="/problem-solving/" class="back">← Back</a>
    {% else %}
        <a href="/archives/" class="back">← Back</a>
    {% endif %}

    <h1>{{ page.title }}</h1>
    
    {% if page.date %}
        {% assign post_year = page.date | date: "%Y" %}
        {% if post_year != "9999" %}
            <div class="post-info">
                {{ page.date | date: "%Y-%m-%d" }}
            </div>
        {% else %}
            <div class="no-date-spacer"></div>
        {% endif %}
    {% else %}
        <div class="no-date-spacer"></div>
    {% endif %}

    <div class="post-content">
        {{ content }}
    </div>
</body>
</html>
