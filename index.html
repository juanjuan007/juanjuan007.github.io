<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook | Brian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fff;
            color: #111;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            height: 100vh;
            overflow: hidden; /* 防止主頁捲動，營造精緻感 */
        }

        .container {
            display: flex;
            height: 100%;
        }

        /* 左側條列區 */
        .left-content {
            flex: 1;
            padding: 80px 10%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 40px;
            border-left: 8px solid #000;
            padding-left: 20px;
        }

        .note-list {
            list-style: none;
        }

        .note-item {
            margin-bottom: 25px;
            position: relative;
        }

        .note-item a {
            text-decoration: none;
            color: #444;
            font-size: 1.4rem;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }

        /* 序號裝飾 */
        .note-item a::before {
            content: "→";
            margin-right: 15px;
            font-family: monospace;
            opacity: 0;
            transform: translateX(-10px);
            transition: 0.3s;
        }

        .note-item a:hover {
            color: #000;
            padding-left: 10px;
        }

        .note-item a:hover::before {
            opacity: 1;
            transform: translateX(0);
        }

        /* 右側照片區 */
        .right-image {
            flex: 1;
            background-color: #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        .right-image img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保照片填滿區域且不變形 */
            filter: grayscale(100%); /* 灰階效果更顯個性，可刪除 */
            transition: 0.5s;
        }

        .right-image:hover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* 手機板調整 */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .right-image { display: none; } /* 手機板隱藏圖片，節省空間 */
            body { overflow: auto; }
            header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <main class="left-content">
            <header>
                <h1>CP NOTE<span>.</span></h1>
            </header>

            <ul class="note-list">
                <li class="note-item">
                    <a href="algorithms.html">Algorithms / 演算法</a>
                </li>
                <li class="note-item">
                    <a href="data-structures.html">Data Structures / 資料結構</a>
                </li>
                <li class="note-item">
                    <a href="web-notes.html">Web Notes / 網頁筆記</a>
                </li>
                <li class="note-item">
                    <a href="daily-logs.html">Daily Logs / 開發日誌</a>
                </li>
                <li class="note-item">
                    <a href="resources.html">Resources / 常用資源</a>
                </li>
            </ul>
        </main>

        <aside class="right-image">
            <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80" alt="Cover Image">
        </aside>
    </div>

</body>
</html>
