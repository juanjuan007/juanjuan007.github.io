<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cp.juanjuan</title>
    <style>
        /* 基礎設定 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #f8f9fa;
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "Microsoft JhengHei", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 1. 整體方格 */
        .main-container {
            display: flex;
            width: 100%;
            max-width: 1200px; 
            background: white;
            padding: 80px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.06);
            border-radius: 24px;
            align-items: center;
        }

        /* 2. 左側照片區 */
        .photo-side {
            flex: 1.2;
            padding-right: 80px;
            display: flex;
            justify-content: center;
        }

        .photo-frame {
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }

        .photo-frame:hover img {
            transform: scale(1.05);
        }

        /* 3. 右側文字區 */
        .content-side {
            flex: 1;
            border-left: 4px solid #f0f0f0;
            padding-left: 80px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 50px;
            letter-spacing: -2px;
            line-height: 1;
        }

        .note-list {
            list-style: none;
        }

        .note-item {
            margin-bottom: 30px;
        }

        .note-item a {
            text-decoration: none;
            color: #666;
            font-size: 1.8rem;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .note-item a:hover {
            color: #000;
            transform: translateX(15px);
        }

        /* 響應式調整 */
        @media (max-width: 992px) {
            .main-container {
                flex-direction: column;
                padding: 40px;
                text-align: center;
            }
            .photo-side { padding-right: 0; margin-bottom: 40px; }
            .content-side { border-left: none; padding-left: 0; border-top: 4px solid #f0f0f0; padding-top: 40px; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="photo-side">
            <div class="photo-frame">
                <img src="juan.jpg" alt="juanjuan">
            </div>
        </div>

        <div class="content-side">
            <h1>juanjuan<br>鬥 code 年華.</h1>
            <ul class="note-list">
                <li class="note-item"><a href="/blog/about-me/">About me & Blog</a></li>
                <li class="note-item"><a href="/blog/algorithm-note/">Algorithm Note</a></li>
                <li class="note-item"><a href="/blog/problem-solving/">Problem Solving</a></li>
            </ul>
        </div>
    </div>

</body>
</html>
