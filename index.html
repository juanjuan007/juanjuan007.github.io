<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian's Dev Notebook</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #fafafa;
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-container {
            display: flex;
            width: 90%;
            max-width: 1000px;
            background: white;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 12px;
            align-items: center;
        }
        /* 左側照片 */
        .photo-side {
            flex: 1;
            padding-right: 40px;
        }
        .photo-frame {
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1 / 1; /* 正方形感 */
            overflow: hidden;
            border-radius: 8px;
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 右側文字 */
        .content-side {
            flex: 1;
            border-left: 1px solid #eee;
            padding-left: 40px;
        }
        h1 { font-size: 2rem; margin-bottom: 30px; letter-spacing: -1px; }
        .note-list { list-style: none; }
        .note-item { margin-bottom: 20px; }
        .note-item a {
            text-decoration: none;
            color: #555;
            font-size: 1.2rem;
            font-weight: 500;
            transition: 0.2s;
        }
        .note-item a:hover { color: #000; padding-left: 10px; }
        
        @media (max-width: 768px) {
            .main-container { flex-direction: column; height: auto; margin: 20px; }
            .photo-side { padding-right: 0; margin-bottom: 30px; }
            .content-side { border-left: none; padding-left: 0; border-top: 1px solid #eee; padding-top: 30px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="photo-side">
            <div class="photo-frame">
                <img src="juan.jpg" alt="Juan">
            </div>
        </div>

        <div class="content-side">
            <h1>NOTES & PROJECTS.</h1>
            <ul class="note-list">
                <li class="note-item"><a href="algo.html">Algorithm Notes</a></li>
                <li class="note-item"><a href="web.html">Web Development</a></li>
                <li class="note-item"><a href="problems.html">Problem Solving</a></li>
                <li class="note-item"><a href="ds.html">Data Structures</a></li>
            </ul>
        </div>
    </div>

</body>
</html>
